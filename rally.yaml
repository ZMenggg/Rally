# Rally.yaml — 多 VPS 带宽聚合代理配置
# 所有示例 IP 和密码均为演示用途，请替换为实际值。

bind: ":1080"           # SOCKS5 统一出口
balance: roundrobin     # 负载均衡策略 (roundrobin | leastconn)

log:
  level: info

# VPS 后端列表
# 支持的协议类型: hysteria2, socks5, ss(shadowsocks), trojan, vless
vps:
  - name: hy2-node
    type: hysteria2
    server: 203.0.113.1
    port: 23872
    password: "hy2-secret"
    sni: example.com
    down_mbps: 500
    up_mbps: 50

  - name: socks-node
    type: socks5
    server: 203.0.113.2
    port: 1080

  - name: ss-node
    type: ss
    server: 203.0.113.3
    port: 8388
    password: "ss-key"
    cipher: AEAD_CHACHA20_POLY1305

  - name: trojan-node
    type: trojan
    server: 203.0.113.4
    port: 443
    password: "trojan-pass"
    sni: trojan.example.com

  - name: vless-node
    type: vless
    server: 203.0.113.5
    port: 443
    uuid: "7a9f8c1e-3b2d-4e5f-8a1b-2c3d4e5f6a7b"
    flow: xtls-rprx-vision
    sni: vless.example.com
